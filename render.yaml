# ============================================================
# Campus Sphere — Render Blueprint (Native Python)
# ============================================================
# Deploy: https://render.com/deploy → point to this repo

databases:
  - name: campus-sphere-db
    plan: free
    databaseName: campus_sphere
    user: campus_sphere_user

services:
  - type: web
    name: campus-sphere-api
    plan: free
    runtime: python
    buildCommand: python --version && python -m pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: RENDER_PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_HOST
        fromDatabase:
          name: campus-sphere-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: campus-sphere-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: campus-sphere-db
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: campus-sphere-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: campus-sphere-db
          property: password
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MISTRAL_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
